<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moss - Social Links</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --moss-50: #f5f8f0;
            --moss-100: #e8f1e0;
            --moss-200: #d4e5c8;
            --moss-300: #bfd9b0;
            --moss-400: #a8cc8f;
            --moss-500: #8fb86f;
            --moss-600: #7da85f;
            --moss-700: #6b964f;
            --moss-800: #5a8240;
            --moss-900: #4a6e32;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: linear-gradient(135deg, #c8e6b8 0%, #a8cc8f 50%, #8fb86f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            width: 100%;
            max-width: 28rem;
        }

        .card {
            background: #f5f8f0;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            border: 2px solid #d4e5c8;
        }

        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .profile-image-wrapper {
            position: relative;
            width: 8rem;
            height: 8rem;
        }

        .profile-image {
            width: 100%;
            height: 100%;
            border-radius: 9999px;
            object-fit: cover;
            border: 4px solid var(--moss-300);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .profile-info {
            text-align: center;
        }

        .profile-name {
            font-size: 2.25rem;
            font-weight: 700;
            color: var(--moss-700);
            margin-bottom: 0.5rem;
        }

        .profile-title {
            color: var(--moss-600);
            font-size: 0.875rem;
            font-weight: 500;
        }

        .socials-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .socials-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--moss-700);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .socials-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            background-color: var(--moss-100);
            color: var(--moss-700);
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            transform: scale(1);
        }

        .social-link:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .social-link.tiktok:hover {
            background-color: #000;
            color: white;
        }

        .social-link.instagram:hover {
            background-color: #ec4899;
            color: white;
        }

        .social-link.facebook:hover {
            background-color: #2563eb;
            color: white;
        }

        .social-link.twitch:hover {
            background-color: #a855f7;
            color: white;
        }

        .social-link.youtube:hover {
            background-color: #dc2626;
            color: white;
        }

        .social-link.discord:hover {
            background-color: #5865f2 !important;
            color: white !important;
        }

        .social-icon {
            width: 1.25rem;
            height: 1.25rem;
        }

        .footer {
            padding-top: 1rem;
            border-top: 1px solid var(--moss-200);
        }

        .footer-text {
            text-align: center;
            font-size: 0.75rem;
            color: var(--moss-500);
        }
    </style>
</head>
